# Database Configuration
# The ${NAME:DEFAULT} syntax means: Use the environment variable 'NAME'. 
# If it's not found, use 'DEFAULT'.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:your_local_password_here}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Custom JWT Secret (Moved from Java file to here)
app.jwt.secret=${JWT_SECRET:MTYyN2M4YjA1OTY4YTg1YTM2ZDFiYjA3ZGE1Y2M0ZTM_DEVELOPMENT_ONLY}
app.jwt.expiration=86400000